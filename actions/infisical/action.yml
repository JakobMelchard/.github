name: "Infisical Secrets"
description: "Install Infisical CLI and inject secrets into the workflow environment"

inputs:
  client-id:
    description: "Infisical machine identity client ID"
    required: true
  client-secret:
    description: "Infisical machine identity client secret"
    required: true
  project-id:
    description: "Infisical project ID"
    required: true
  env-slug:
    description: "Infisical environment slug"
    default: "prod"
  infisical-version:
    description: "Infisical CLI version"
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install Infisical CLI
      shell: bash
      run: |
        curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
        sudo apt-get install -y infisical

    - name: Export secrets to environment
      shell: bash
      run: |
        infisical export \
          --clientId="${{ inputs.client-id }}" \
          --clientSecret="${{ inputs.client-secret }}" \
          --projectId="${{ inputs.project-id }}" \
          --env="${{ inputs.env-slug }}" \
          --format=dotenv >> "$GITHUB_ENV"
