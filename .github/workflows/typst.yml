name: typst

on:
  workflow_call:
    inputs:
      typst_version:
        required: false
        type: string
        default: 'latest'
      source:
        required: true
        type: string
      output:
        required: false
        type: string
        default: 'document.pdf'
      release:
        description: 'attach output to GitHub release if triggered by tag'
        required: false
        type: boolean
        default: false

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: JakobMelchard/.github/actions/setup-typst@main
        with:
          version: ${{ inputs.typst_version }}

      - name: compile
        run: typst compile "${{ inputs.source }}" "${{ inputs.output }}"

      - uses: actions/upload-artifact@v7
        with:
          name: pdf
          path: ${{ inputs.output }}
          archive: false

      - name: attach to release
        if: ${{ inputs.release && startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT: ${{ inputs.output }}
        run: gh release upload ${{ github.ref_name }} "$OUTPUT"
